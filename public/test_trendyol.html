<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FiyatTakip AI — Canlı Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: linear-gradient(135deg, #0a0a1a 0%, #111132 50%, #0d0d2b 100%);
      min-height: 100vh;
      color: #e2e8f0;
    }

    /* === HEADER === */
    .top-bar {
      background: rgba(15, 15, 40, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(99, 102, 241, 0.15);
      padding: 14px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text { font-size: 18px; font-weight: 800; color: #e2e8f0; }
    .logo-text span { color: #818cf8; }
    .env-badge {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #4ade80;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    /* === MAIN LAYOUT === */
    .main-content { padding: 30px; max-width: 1200px; margin: 0 auto; }

    .section-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #6366f1;
      font-weight: 700;
      margin-bottom: 20px;
    }

    /* === PRODUCT GRID === */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    .product-card {
      background: rgba(30, 30, 60, 0.7);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(99, 102, 241, 0.1);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .product-card:hover {
      border-color: rgba(99, 102, 241, 0.4);
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    .card-image {
      width: 100%; height: 180px;
      background: linear-gradient(135deg, #1a1a3a, #2d2d6a);
      display: flex; align-items: center; justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .card-image img {
      width: 100%; height: 100%;
      object-fit: contain;
      padding: 12px;
    }
    .card-image-placeholder { font-size: 60px; }

    .decision-strip {
      position: absolute; top: 12px; right: 12px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .decision-strip.avoid { background: rgba(239,68,68,0.9); color: white; }
    .decision-strip.buy { background: rgba(34,197,94,0.9); color: white; }
    .decision-strip.wait { background: rgba(234,179,8,0.9); color: #1a1a2e; }

    .platform-chip {
      position: absolute; top: 12px; left: 12px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .card-body { padding: 18px; }
    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 10px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-price-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .card-price {
      font-size: 22px;
      font-weight: 800;
      color: #f97316;
    }

    .card-trust-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .trust-label-small {
      font-size: 11px;
      color: #64748b;
    }
    .trust-value {
      font-size: 12px;
      font-weight: 700;
    }
    .trust-value.low { color: #f87171; }
    .trust-value.mid { color: #fbbf24; }
    .trust-value.high { color: #4ade80; }

    .trust-bar-small {
      height: 4px;
      background: #1e1e3a;
      border-radius: 2px;
      overflow: hidden;
    }
    .trust-fill-small {
      height: 100%;
      border-radius: 2px;
      transition: width 1s ease;
    }

    /* === DETAIL MODAL === */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.active { display: flex; }

    .modal-panel {
      background: #12122a;
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 20px;
      width: 100%;
      max-width: 700px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 40px 80px rgba(0,0,0,0.6);
      animation: modalIn 0.3s ease;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-header {
      background: linear-gradient(135deg, #1e1b4b, #312e81);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(99,102,241,0.2);
      position: sticky; top: 0; z-index: 1;
    }
    .modal-header h2 {
      font-size: 16px;
      font-weight: 700;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .modal-close {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #94a3b8;
      width: 32px; height: 32px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .modal-close:hover { background: rgba(255,255,255,0.2); color: #f1f5f9; }

    .modal-body { padding: 24px; }

    /* Decision Box */
    .decision-box {
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .decision-box.avoid { background: rgba(239,68,68,0.1); border: 1.5px solid rgba(239,68,68,0.4); }
    .decision-box.buy { background: rgba(34,197,94,0.1); border: 1.5px solid rgba(34,197,94,0.4); }
    .decision-box.wait { background: rgba(234,179,8,0.1); border: 1.5px solid rgba(234,179,8,0.4); }
    .decision-icon { font-size: 32px; }
    .decision-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
    .decision-main { font-size: 18px; font-weight: 800; }
    .avoid .decision-label { color: #f87171; }
    .avoid .decision-main { color: #fca5a5; }
    .buy .decision-label { color: #4ade80; }
    .buy .decision-main { color: #86efac; }
    .wait .decision-label { color: #facc15; }
    .wait .decision-main { color: #fde68a; }

    /* Info Grid */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .info-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 14px;
    }
    .info-card-label { font-size: 11px; color: #64748b; margin-bottom: 4px; }
    .info-card-value { font-size: 18px; font-weight: 700; }
    .info-card-value.price-color { color: #818cf8; }
    .info-card-value.trust-color-low { color: #f87171; }
    .info-card-value.trust-color-mid { color: #fbbf24; }
    .info-card-value.trust-color-high { color: #4ade80; }

    /* Trust Bar */
    .trust-section { margin-bottom: 20px; }
    .trust-bar { height: 10px; background: #1e1e3a; border-radius: 5px; overflow: hidden; }
    .trust-fill { height: 100%; border-radius: 5px; transition: width 1s ease; }

    /* Reasoning */
    .reasoning {
      background: rgba(255,255,255,0.02);
      border-left: 3px solid #334155;
      padding: 14px;
      border-radius: 0 10px 10px 0;
      margin-bottom: 20px;
      font-size: 13px;
      color: #94a3b8;
      line-height: 1.7;
    }

    /* Risk Tags */
    .risk-tags { margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 6px; }
    .risk-tag {
      background: rgba(239,68,68,0.1);
      color: #f87171;
      border: 1px solid rgba(239,68,68,0.2);
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }
    .risk-tag.warning {
      background: rgba(234,179,8,0.1);
      color: #fbbf24;
      border-color: rgba(234,179,8,0.2);
    }

    /* Price Chart */
    .price-chart { margin-bottom: 20px; }
    .chart-label { font-size: 12px; color: #64748b; font-weight: 600; margin-bottom: 10px; }
    .chart-bars {
      display: flex; align-items: flex-end; gap: 3px;
      height: 70px;
      background: rgba(255,255,255,0.02);
      border-radius: 10px;
      padding: 10px;
    }
    .chart-bar {
      flex: 1;
      border-radius: 3px 3px 0 0;
      min-width: 6px;
      transition: height 0.5s ease;
      position: relative;
    }
    .chart-bar:hover::after {
      content: attr(data-label);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #1e1e3a;
      border: 1px solid #2d2d5a;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 10px;
      color: #e2e8f0;
      white-space: nowrap;
    }
    .chart-bar.normal { background: #475569; }
    .chart-bar.anomaly { background: #dc2626; }
    .chart-bar.current { background: linear-gradient(to top, #f97316, #fb923c); }

    /* Affiliate */
    .affiliate-btn {
      display: block;
      background: linear-gradient(135deg, #d97706, #f59e0b);
      color: #1a1a2e;
      text-decoration: none;
      padding: 14px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 14px;
      text-align: center;
      margin-bottom: 12px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(217,119,6,0.3);
    }
    .affiliate-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(217,119,6,0.4); }

    .detail-link {
      display: block;
      color: #818cf8;
      border: 1px solid rgba(99,102,241,0.3);
      text-decoration: none;
      padding: 12px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 13px;
      text-align: center;
      transition: background 0.2s;
    }
    .detail-link:hover { background: rgba(99,102,241,0.1); }

    /* Loading */
    .loading { text-align: center; padding: 80px 20px; color: #6366f1; }
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(99,102,241,0.2);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Stats Row */
    .stats-row {
      display: flex; gap: 16px; margin-bottom: 30px;
    }
    .stat-card {
      flex: 1;
      background: rgba(30,30,60,0.7);
      border: 1px solid rgba(99,102,241,0.1);
      border-radius: 14px;
      padding: 18px;
      text-align: center;
    }
    .stat-value { font-size: 28px; font-weight: 800; margin-bottom: 4px; }
    .stat-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
    .stat-value.purple { color: #818cf8; }
    .stat-value.red { color: #f87171; }
    .stat-value.green { color: #4ade80; }
    .stat-value.amber { color: #fbbf24; }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="top-bar">
  <div class="logo">
    <div class="logo-icon">🤖</div>
    <div class="logo-text">Fiyat<span>Takip</span> AI</div>
  </div>
  <div class="env-badge">● Sunucu Canlı — localhost:3000</div>
</div>

<div class="main-content">

  <!-- Stats -->
  <div class="stats-row" id="stats-row">
    <div class="stat-card"><div class="stat-value purple" id="stat-total">—</div><div class="stat-label">Takip Edilen Ürün</div></div>
    <div class="stat-card"><div class="stat-value red" id="stat-avoid">—</div><div class="stat-label">UZAK DUR Kararı</div></div>
    <div class="stat-card"><div class="stat-value green" id="stat-buy">—</div><div class="stat-label">AL Kararı</div></div>
    <div class="stat-card"><div class="stat-value amber" id="stat-wait">—</div><div class="stat-label">BEKLE Kararı</div></div>
  </div>

  <p class="section-title">📊 Yapay Zeka Analiz Sonuçları — Canlı Veriler</p>

  <div id="product-grid" class="product-grid">
    <div class="loading">
      <div class="spinner"></div>
      <p>Ürünler yükleniyor...</p>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-panel">
    <div class="modal-header">
      <h2>🤖 FiyatTakip AI Detaylı Analiz</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const API = 'http://localhost:3000/api';
let allProducts = [];

async function init() {
  try {
    const res = await fetch(`${API}/products`);
    allProducts = await res.json();
    renderStats(allProducts);
    renderGrid(allProducts);
  } catch (err) {
    document.getElementById('product-grid').innerHTML = `
      <div class="loading"><p style="color:#f87171;">❌ API'ye bağlanılamadı. Sunucu çalışıyor mu?</p></div>
    `;
  }
}

function renderStats(products) {
  document.getElementById('stat-total').textContent = products.length;
  document.getElementById('stat-avoid').textContent = products.filter(p => p.decision === 'AVOID').length;
  document.getElementById('stat-buy').textContent = products.filter(p => p.decision === 'BUY').length;
  document.getElementById('stat-wait').textContent = products.filter(p => p.decision !== 'AVOID' && p.decision !== 'BUY').length;
}

function renderGrid(products) {
  const grid = document.getElementById('product-grid');
  grid.innerHTML = products.map(p => {
    const dec = (p.decision || 'wait').toLowerCase();
    const decLabel = dec === 'avoid' ? 'UZAK DUR' : dec === 'buy' ? 'AL' : 'BEKLE';
    const trust = p.trustScore || 50;
    const trustClass = trust < 50 ? 'low' : trust < 70 ? 'mid' : 'high';
    const trustGrad = trust < 50 ? 'linear-gradient(90deg,#ef4444,#f87171)' : trust < 70 ? 'linear-gradient(90deg,#f59e0b,#fbbf24)' : 'linear-gradient(90deg,#22c55e,#4ade80)';
    const imgHtml = p.image
      ? `<img src="${p.image}" alt="${p.name}" />`
      : `<div class="card-image-placeholder">📦</div>`;

    return `
      <div class="product-card" onclick="openDetail(${p.id})">
        <div class="card-image">
          ${imgHtml}
          <div class="platform-chip">${(p.platforms || []).join(' · ')}</div>
          <div class="decision-strip ${dec}">${decLabel}</div>
        </div>
        <div class="card-body">
          <div class="card-title">${p.name}</div>
          <div class="card-price-row">
            <div class="card-price">${Number(p.currentPrice).toLocaleString('tr-TR')} TL</div>
          </div>
          <div class="card-trust-row">
            <span class="trust-label-small">Güven Skoru</span>
            <span class="trust-value ${trustClass}">${trust}/100</span>
          </div>
          <div class="trust-bar-small">
            <div class="trust-fill-small" style="width:${trust}%;background:${trustGrad};"></div>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

async function openDetail(id) {
  const overlay = document.getElementById('modal-overlay');
  const body = document.getElementById('modal-body');
  overlay.classList.add('active');
  body.innerHTML = '<div class="loading"><div class="spinner"></div><p>Detaylar yükleniyor...</p></div>';

  try {
    const res = await fetch(`${API}/products/${id}`);
    const p = await res.json();
    renderDetail(body, p);
  } catch (err) {
    body.innerHTML = '<p style="color:#f87171;text-align:center;padding:40px;">Detay alınamadı.</p>';
  }
}

function renderDetail(container, p) {
  const ai = p.aiAnalysis || {};
  const dec = (ai.decision || 'WAIT').toUpperCase();
  const decClass = dec === 'AVOID' ? 'avoid' : dec === 'BUY' ? 'buy' : 'wait';
  const decIcon = dec === 'AVOID' ? '🚨' : dec === 'BUY' ? '✅' : '⚠️';
  const decLabel = dec === 'AVOID' ? 'UZAK DUR' : dec === 'BUY' ? 'SATIN AL' : 'BEKLE';
  const decSub = dec === 'AVOID' ? 'Sahte İndirim / Yüksek Risk!' : dec === 'BUY' ? 'Gerçek Fiyat Avantajı!' : 'Fiyat Normal Seyirde';

  const trust = ai.trustScore || 50;
  const trustClass = trust < 50 ? 'trust-color-low' : trust < 70 ? 'trust-color-mid' : 'trust-color-high';
  const trustGrad = trust < 50 ? 'linear-gradient(90deg,#ef4444,#f87171)' : trust < 70 ? 'linear-gradient(90deg,#f59e0b,#fbbf24)' : 'linear-gradient(90deg,#22c55e,#4ade80)';

  // Price chart from sources
  let priceChartHtml = '';
  if (p.sources && p.sources.length > 0 && p.sources[0].prices) {
    const prices = p.sources[0].prices;
    const maxPrice = Math.max(...prices.map(pr => pr.price));
    const minPrice = Math.min(...prices.map(pr => pr.price)) * 0.9;
    const range = maxPrice - minPrice || 1;

    const bars = prices.map((pr, i) => {
      const h = ((pr.price - minPrice) / range) * 100;
      const isLast = i === prices.length - 1;
      const cls = pr.isAnomaly ? 'anomaly' : isLast ? 'current' : 'normal';
      const date = new Date(pr.createdAt).toLocaleDateString('tr-TR', { day: '2-digit', month: 'short' });
      return `<div class="chart-bar ${cls}" style="height:${Math.max(h,8)}%" data-label="${Number(pr.price).toLocaleString('tr-TR')} TL — ${date}"></div>`;
    }).join('');

    priceChartHtml = `
      <div class="price-chart">
        <div class="chart-label">📈 Fiyat Geçmişi</div>
        <div class="chart-bars">${bars}</div>
      </div>
    `;
  }

  // Risk tags
  const riskHtml = (ai.riskFactors || []).map(r => `<span class="risk-tag">⚠ ${r}</span>`).join('');

  // Review analysis
  let reviewHtml = '';
  if (p.reviewAnalysis) {
    const ra = p.reviewAnalysis;
    reviewHtml = `
      <div class="info-grid" style="margin-bottom:20px;">
        <div class="info-card">
          <div class="info-card-label">Sahte Yorum Oranı</div>
          <div class="info-card-value" style="color:#f87171;">%${ra.fakePercent || 0}</div>
        </div>
        <div class="info-card">
          <div class="info-card-label">Gerçek Yorum Oranı</div>
          <div class="info-card-value" style="color:#4ade80;">%${ra.realPercent || 0}</div>
        </div>
      </div>
    `;
  }

  // Source price
  const currentPrice = p.sources?.[0]?.currentPrice || 0;
  const discount = p.sources?.[0]?.discount;
  let discountHtml = '';
  if (discount) {
    discountHtml = `
      <div class="info-card">
        <div class="info-card-label">İndirim Durumu</div>
        <div class="info-card-value" style="color:${discount.isReal ? '#4ade80' : '#f87171'};">${discount.isReal ? '✅ Gerçek' : '❌ Sahte'}</div>
      </div>
    `;
  }

  container.innerHTML = `
    <div class="decision-box ${decClass}">
      <div class="decision-icon">${decIcon}</div>
      <div>
        <div class="decision-label">${decLabel}</div>
        <div class="decision-main">${decSub}</div>
      </div>
    </div>

    <div class="info-grid">
      <div class="info-card">
        <div class="info-card-label">🎯 Gerçek Piyasa Değeri</div>
        <div class="info-card-value price-color">${ai.marketValue ? Number(ai.marketValue).toLocaleString('tr-TR') + ' TL' : '—'}</div>
      </div>
      <div class="info-card">
        <div class="info-card-label">💰 Şu Anki Fiyat</div>
        <div class="info-card-value" style="color:#f97316;">${Number(currentPrice).toLocaleString('tr-TR')} TL</div>
      </div>
      <div class="info-card">
        <div class="info-card-label">🛡️ Güven Skoru</div>
        <div class="info-card-value ${trustClass}">${trust}/100</div>
      </div>
      ${discountHtml}
    </div>

    <div class="trust-section">
      <div class="trust-bar"><div class="trust-fill" style="width:${trust}%;background:${trustGrad};"></div></div>
    </div>

    ${priceChartHtml}

    <div class="reasoning">${ai.reasoning || 'Analiz açıklaması bulunamadı.'}</div>

    ${riskHtml ? `<div class="risk-tags">${riskHtml}</div>` : ''}

    ${reviewHtml}

    <a href="${p.sources?.[0]?.url || '#'}" target="_blank" class="detail-link">🔗 Ürün Sayfasına Git →</a>
  `;
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}

document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

init();
</script>
</body>
</html>
