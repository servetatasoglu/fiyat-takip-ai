<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>FiyatTakip AI</title>
  <style>
    body {
      width: 300px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 12px;
      margin-bottom: 16px;
    }
    .logo {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    .title {
      font-weight: 800;
      font-size: 15px;
    }
    .desc {
      font-size: 13px;
      color: #94a3b8;
      line-height: 1.5;
      margin-bottom: 16px;
    }
    .btn {
      display: block;
      width: 100%;
      text-align: center;
      padding: 10px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 13px;
      transition: opacity 0.2s;
    }
    .btn:hover {
      opacity: 0.9;
    }
    .status {
      font-size: 11px;
      color: #4ade80;
      text-align: center;
      margin-top: 12px;
      padding: 6px;
      background: rgba(74, 222, 128, 0.1);
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🤖</div>
    <div class="title">FiyatTakip AI</div>
  </div>
  
  <p class="desc">
    Eklentiniz aktif! Trendyol, Hepsiburada veya Amazon'da bir ürün sayfasına girdiğinizde analiz kartı otomatik olarak sağ alt köşede belirecektir.
  </p>
  
  <a href="http://localhost:3000/test_trendyol.html" target="_blank" class="btn">
    AI Test Panelini Aç
  </a>

  <div class="status">
    ✅ Korumadasınız
  </div>
</body>
</html>
